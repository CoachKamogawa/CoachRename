name: CoachRename
version: 1.0.0
main: com.magicera.coachrename.CoachRenamePlugin
api-version: '1.21'
author: Coach

commands:
  nick:
    description: Set your nickname
    usage: /nick <nickname>

  nickclear:
    description: Clear your nickname
    usage: /nickclear

  truename:
    description: Reveal real usernames
    usage: /truename [name]
